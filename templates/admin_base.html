{% extends "base.html" %}
{% block content %}
<div class="admin-app">
    <aside class="admin-sidebar">
        <div class="admin-sidebar-brand">
            <a href="{{ url_for('admin') }}" class="admin-brand-link">
                <div class="admin-brand-icon"><i class="fa-solid fa-mountain-sun"></i></div>
                <div class="admin-brand-text">
                    <span class="admin-brand-name">{{ business.name }}</span>
                    <span class="admin-brand-role">แผงควบคุม</span>
                </div>
            </a>
        </div>
        <nav class="admin-nav">
            <div class="admin-nav-section">
                <span class="admin-nav-label">เมนูหลัก</span>
                <a href="{{ url_for('admin') }}" class="admin-nav-link {{ 'active' if request.endpoint == 'admin' else '' }}">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span>ภาพรวม</span>
                </a>
                <a href="{{ url_for('admin_rooms') }}" class="admin-nav-link {{ 'active' if request.endpoint == 'admin_rooms' else '' }}">
                    <i class="fa-solid fa-door-open"></i>
                    <span>จัดการห้องพัก</span>
                </a>
            </div>
            <div class="admin-nav-footer">
                <a href="{{ url_for('rooms') }}" class="admin-nav-link admin-nav-outline">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>กลับหน้าเว็บ</span>
                </a>
                <a href="{{ url_for('admin_logout') }}" class="admin-nav-link admin-nav-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>ออกจากระบบ</span>
                </a>
            </div>
        </nav>
    </aside>
    <main class="admin-content">
        <div class="admin-content-inner">
            {% block admin_content %}{% endblock %}
        </div>
    </main>
</div>
{% endblock %}
